name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: check
        run: |
          if [ -f package.json ] && [ -f pnpm-lock.yaml ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Project not yet scaffolded (no package.json / pnpm-lock.yaml). Skipping build."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.ready == 'true'
        uses: pnpm/action-setup@v6
        # version comes from package.json "packageManager" field

      - if: steps.check.outputs.ready == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - if: steps.check.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      - if: steps.check.outputs.ready == 'true'
        name: Build
        run: pnpm build

      - if: steps.check.outputs.ready == 'true'
        name: SPA fallback for deep-link reloads
        run: cp dist/index.html dist/404.html

      - if: steps.check.outputs.ready == 'true'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - if: steps.check.outputs.ready == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    if: needs.build.outputs.ready == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
